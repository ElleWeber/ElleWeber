<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREENK | Final Fix</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2225%22 fill=%22white%22/></svg>">
    <style>
        :root { --bg: #08080A; --card: #121217; --accent: #5D5FEF; --green: #4ADE80; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; padding: 20px; display: flex; flex-direction: column; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
        textarea { width: 100%; height: 350px; background: transparent; border: none; color: white; padding: 30px; font-size: 18px; outline: none; resize: none; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-between; padding: 20px 30px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.1); }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        .actions { padding: 20px; display: flex; gap: 10px; background: #000; }
        button { flex: 1; padding: 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        #btnGo { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align:center; margin-bottom:20px;">
            <h1 style="letter-spacing:-1px;">SHREENK</h1>
        </header>

        <div class="glass">
            <textarea id="box" placeholder="Collez votre texte ici..."></textarea>
            <div class="stats">
                <div>
                    <span style="font-size:10px; color:#666;">ÉCONOMIE (€)</span>
                    <span class="stat-val" id="resMoney" style="color:#4ADE80;">0.000 €</span>
                </div>
                <div style="text-align:right;">
                    <span style="font-size:10px; color:#666;">TOKENS</span>
                    <span class="stat-val" id="resTokens">0</span>
                </div>
            </div>
            <div class="actions">
                <button id="btnGo" onclick="startShreenk()">Compresser & Copier</button>
            </div>
        </div>
    </div>

    <script>
        function startShreenk() {
            const area = document.getElementById('box');
            const mon = document.getElementById('resMoney');
            const tok = document.getElementById('resTokens');
            const btn = document.getElementById('btnGo');

            if(!area.value) return;

            const baseLen = area.value.length;

            // Nettoyage
            let txt = area.value.replace(/(bonjour|salut|hello|merci|svp|s'il vous plaît|pourriez-vous|est-ce que|thanks|please)/gi, '');
            txt = txt.replace(/\n\s*\n/g, '\n').trim();
            
            const final = "[TASK]\n" + txt + "\n[MODE:DENSE]";
            area.value = final;

            // Calculs
            const finalLen = final.length;
            const diff = baseLen - finalLen;
            const tokens = diff > 0 ? Math.ceil(diff / 4) : 0;
            const euros = (tokens * 0.00003).toFixed(4);

            // Affichage
            tok.innerText = tokens;
            mon.innerText = euros + " €";

            // Presse-papier
            navigator.clipboard.writeText(final);
            btn.innerText = "COPIÉ !";
            btn.style.background = "#4ADE80";
            setTimeout(() => { 
                btn.innerText = "Compresser & Copier"; 
                btn.style.background = "#5D5FEF";
            }, 2000);
        }
    </script>
</body>
</html>
