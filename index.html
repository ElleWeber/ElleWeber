<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREENK | Économisez sur vos Tokens IA</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2225%22 fill=%22white%22/></svg>">

    <style>
        :root {
            --bg: #000000;
            --card: #0c0c0c;
            --accent: #8A2BE2; /* Violet Tech (BlueViolet) */
            --green: #34C759;
            --text: #ffffff;
            --text-secondary: #666666;
            --border: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-shell {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 16px;
            margin-top: 10px;
        }

        .main-card {
            background: var(--card);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            min-height: 500px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.1);
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 30px;
            font-size: 18px;
            resize: none;
            outline: none;
            line-height: 1.6;
            font-family: inherit;
        }

        .stats-bar {
            background: rgba(255,255,255,0.02);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--green); }

        .controls {
            padding: 24px 30px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            background: #000;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
        }

        button {
            border-radius: 16px;
            padding: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #fff;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .badge {
            background: rgba(138, 43, 226, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            color: var(--accent);
            border: 1px solid rgba(138, 43, 226, 0.3);
            font-weight: 600;
        }

        /* FOOTER */
        footer {
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #333;
            border-top: 1px solid #111;
            padding-top: 25px;
        }

        footer a { color: #555; text-decoration: none; margin-right: 20px; }
        footer a:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="app-shell">
        <header>
            <div style="margin-bottom: 20px;"><span class="badge">V1.5 BETA // AI OPTIMIZER</span></div>
            <h1>SHREENK</h1>
            <p class="tagline">Distillez vos prompts pour économiser vos tokens.</p>
        </header>

        <div class="main-card">
            <textarea id="editor" placeholder="Collez votre contenu ici..."></textarea>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Argent Économisé</span>
                    <span class="stat-value" id="money">0.000 €</span>
                </div>
                <div class="stat-item" style="text-align: right;">
                    <span class="stat-label">Tokens Retirés</span>
                    <span class="stat-value" id="tokens" style="color: white;">0</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn-primary" onclick="shreenk()">Compresser le Prompt</button>
                <button class="btn-secondary" onclick="snapshot()">Context Snapshot</button>
            </div>
        </div>

        <p style="text-align: center; font-size: 12px; color: #333; margin-top: 25px;">
            Traitement local : Vos données ne transitent par aucun serveur.
        </p>

        <footer>
            <div>
                <a href="#">Business Plan</a>
                <a href="#">Confidentialité</a>
                <a href="#">Mentions</a>
            </div>
            <div>© 2026 SHREENK.APP // Par Elodie Weber</div>
        </footer>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const money = document.getElementById('money');
        const tokens = document.getElementById('tokens');

        function shreenk() {
            const raw = editor.value;
            if(!raw) return;
            const oldLen = raw.length;

            // Engine de distillation
            let clean = raw.replace(/(bonjour|salut|hello|merci|svp|s'il vous plaît|pourriez-vous|est-ce que|thanks|please)/gi, '');
            clean = clean.replace(/\n\s*\n/g, '\n').trim();
            const result = `[TASK]\n${clean}\n[MODE:DENSE]`;
            
            editor.value = result;
            navigator.clipboard.writeText(result);

            const tokenCount = Math.max(0, Math.ceil((oldLen - result.length) / 4));
            const savings = (tokenCount * 0.00003).toFixed(4);

            tokens.innerText = tokenCount;
            money.innerText = savings + " €";
            
            const btn = document.querySelector('.btn-primary');
            btn.innerText = "Copié dans le presse-papier !";
            btn.style.background = "#34C759";
            setTimeout(() => {
                btn.innerText = "Compresser le Prompt";
                btn.style.background = "var(--accent)";
            }, 2000);
        }

        function snapshot() {
            const snap = "[ACTION: CONTEXT_DUMP]\n[MODE: MIGRATION]";
            editor.value = snap;
            navigator.clipboard.writeText(snap);
        }
    </script>
</body>
</html>
