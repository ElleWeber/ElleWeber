<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHREENK.APP</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2280%22 fill=%22white%22 font-family=%22monospace%22>S</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2220%22 fill=%22white%22/></svg>">

    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text: #ffffff;
            --subtext: #444444;
            --accent: #00ff88;
            --font: 'JetBrains Mono', 'Roboto Mono', 'Courier New', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .nav {
            padding: 15px 25px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--subtext);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ghost-indicator {
            font-size: 8px;
            border: 1px solid var(--subtext);
            padding: 2px 6px;
            border-radius: 2px;
        }

        /* MAIN EDITOR */
        textarea {
            flex-grow: 1;
            background: var(--bg);
            border: none;
            color: var(--text);
            padding: 30px;
            font-size: 16px;
            line-height: 1.5;
            outline: none;
            resize: none;
            font-family: var(--font);
        }

        /* TOOLBAR & BUTTONS */
        .footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        button {
            background: var(--bg);
            color: var(--text);
            border: none;
            padding: 25px 10px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button:active {
            background: var(--text);
            color: var(--bg);
        }

        button.primary {
            border-right: 1px solid var(--border);
            background: #ffffff;
            color: #000000;
        }

        /* METRICS BAR */
        .metrics {
            padding: 12px 25px;
            font-size: 9px;
            color: var(--subtext);
            display: flex;
            justify-content: space-between;
            background: #050505;
            border-top: 1px solid #0a0a0a;
            text-transform: uppercase;
        }

        .flash-active { color: var(--accent) !important; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav">
        <span>SHREENK.APP // CORE_V1.1</span>
        <span class="ghost-indicator">GHOST_MODE: ACTIVE (100% LOCAL)</span>
    </div>

    <textarea id="io" placeholder="INPUT_RAW_DATA_OR_THOUGHTS..."></textarea>

    <div class="footer">
        <button class="primary" onclick="runShreenk()">SHREENK_NOW</button>
        <button onclick="runSnapshot()">GEN_SNAPSHOT</button>
    </div>

    <div class="metrics">
        <span id="st">STATUS: STANDBY</span>
        <span id="mt">TOKENS_SAVED: 0 // CHARS: 0</span>
    </div>

    <script>
        const io = document.getElementById('io');
        const st = document.getElementById('st');
        const mt = document.getElementById('mt');

        function runShreenk() {
            const raw = io.value;
            if(!raw) return;

            const oldLen = raw.length;

            // 1. ADVANCED NOISE REMOVAL (Week 2 logic)
            let clean = raw.replace(/(hello|hi|hey|greetings|please|could you|would you mind|thanks|thank you|merci|svp|est-ce que|pourriez vous|i would like to|help me to|i need to)/gi, '');
            
            // 2. WHITESPACE DISTILLATION
            clean = clean.replace(/\n\s*\n/g, '\n'); 
            clean = clean.replace(/[ \t]+/g, ' ');

            // 3. STRUCTURE WRAPPING
            const output = `[task]\n${clean.trim()}\n[format:dense]`;
            
            io.value = output;
            copy(output);

            // 4. METRICS CALCULATION (Fixed)
            const newLen = output.length;
            const saved = Math.max(0, Math.ceil((oldLen - newLen) / 4));
            
            updateMetrics("SHREENKED", saved, newLen);
        }

        function runSnapshot() {
            const snap = "action: context_dump\nmode: migration\ntarget: core_logic_only\nno_filler: true";
            io.value = snap;
            copy(snap);
            updateMetrics("SNAPSHOT", 0, snap.length);
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
        }

        function updateMetrics(status, saved, length) {
            st.innerText = `STATUS: ${status}_AND_COPIED`;
            st.classList.add('flash-active');
            mt.innerText = `TOKENS_SAVED: ${saved} // CHARS: ${length}`;
            
            setTimeout(() => {
                st.innerText = "STATUS: STANDBY";
                st.classList.remove('flash-active');
            }, 3000);
        }

        // Focus editor automatically
        window.onload = () => io.focus();
    </script>
</body>
</html>
