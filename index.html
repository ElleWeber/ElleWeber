<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREENK | Distilled Context</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2225%22 fill=%22white%22/></svg>">
    <style>
        :root {
            --bg: #08080A; --card: #121217; --border: rgba(255, 255, 255, 0.08);
            --accent: #5D5FEF; --text-main: #FFFFFF; --text-dim: #63636E; --green: #4ADE80;
        }
        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 900px; padding: 40px 20px; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .brand h1 { font-size: 28px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .glass-panel {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; display: flex; flex-direction: column;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6); overflow: hidden;
        }
        textarea {
            width: 100%; height: 400px; background: transparent; border: none;
            color: white; padding: 40px; font-size: 18px; resize: none;
            outline: none; line-height: 1.7; font-family: inherit; box-sizing: border-box;
        }
        .dashboard {
            display: grid; grid-template-columns: 1fr 1fr;
            padding: 30px 40px; background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--border);
        }
        .stat-group { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 800; transition: all 0.3s ease; }
        .stat-value.money { color: var(--green); }
        .actions { padding: 30px 40px; display: flex; gap: 15px; background: #000; }
        button {
            border-radius: 14px; padding: 22px; font-size: 16px; font-weight: 700;
            cursor: pointer; border: none; transition: 0.2s; font-family: inherit;
        }
        .btn-prime { background: var(--accent); color: white; flex: 2; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: white; flex: 1; border: 1px solid var(--border); }
        footer { margin-top: 40px; display: flex; justify-content: space-between; color: var(--text-dim); font-size: 12px; border-top: 1px solid #111; padding-top: 20px; }
        footer a { color: var(--text-dim); text-decoration: none; margin-right: 20px; }
    </style>
</head>
