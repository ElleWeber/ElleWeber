<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREENK | Distilled Context</title>
    <style>
        :root {
            --bg: #08080A;
            --card: #121217;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #5D5FEF;
            --text-main: #FFFFFF;
            --text-dim: #63636E;
            --green: #4ADE80;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: -0.02em;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .brand h1 { font-size: 24px; margin: 0; font-weight: 700; letter-spacing: -1px; }

        .glass-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: transparent;
            border: none;
            color: white;
            padding: 40px;
            font-size: 18px;
            resize: none;
            outline: none;
            line-height: 1.7;
            font-family: inherit;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 25px 40px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--border);
        }

        .stat-group { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-value.money { color: var(--green); }

        .actions { padding: 30px 40px; display: flex; gap: 15px; }

        button {
            border-radius: 12px;
            padding: 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-prime { background: var(--accent); color: white; flex-grow: 2; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: white; flex-grow: 1; border: 1px solid var(--border); }

        footer { margin-top: 30px; display: flex; justify-content: space-between; color: var(--text-dim); font-size: 12px; }
        footer a { color: var(--text-dim); text-decoration: none; margin-right: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand"><h1>SHREENK</h1></div>
            <div style="font-size: 11px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px;">V3.1 // ELITE EDITION</div>
        </header>

        <div class="glass-panel">
            <textarea id="editor" placeholder="Insérez votre texte ici pour calculer l'économie..."></textarea>
            
            <div class="dashboard">
                <div class="stat-group">
                    <span class="stat-label">Argent économisé</span>
                    <span class="stat-value money" id="moneyCount">0.000 €</span>
                </div>
                <div class="stat-group" style="text-align: right;">
                    <span class="stat-label">Tokens retirés</span>
                    <span class="stat-value" id="tokenCount">0</span>
                </div>
            </div>

            <div class="actions">
                <button class="btn-prime" id="mainBtn" onclick="runShreenk()">Compresser & Copier</button>
                <button class="btn-ghost" onclick="runSnapshot()">Snapshot</button>
            </div>
        </div>

        <footer>
            <div><a href="#">Security</a><a href="#">Pricing</a></div>
            <div>© 2026 SHREENK.APP — Par Elodie Weber</div>
        </footer>
    </div>

    <script>
        function runShreenk() {
            const editor = document.getElementById('editor');
            const moneyEl = document.getElementById('moneyCount');
            const tokenEl = document.getElementById('tokenCount');
            const btn = document.getElementById('mainBtn');

            const originalText = editor.value;
            if (!originalText) return;

            const oldLength = originalText.length;

            // Algorithme de nettoyage (Nettoyage des politesses et bruits)
            let clean = originalText.replace(/(bonjour|salut|hello|merci|svp|s'il vous plaît|pourriez-vous|est-ce que|thanks|please|greetings)/gi, '');
            clean = clean.replace(/\n\s*\n/g, '\n').trim();
            
            const result = `[TASK]\n${clean}\n[MODE:DENSE]`;
            
            editor.value = result;
            const newLength = result.length;

            // Calcul des Tokens (Moyenne : 1 token ≈ 4 caractères)
            const diffChars = oldLength - newLength;
            const removedTokens = Math.max(0, Math.ceil(diffChars / 4));
            
            // Calcul Argent (Estimation moyenne prix GPT-4/Claude Opus)
            const savings = (removedTokens * 0.00003).toFixed(3);

            // Mise à jour visuelle
            tokenEl.innerText = removedTokens;
            moneyEl.innerText = savings + " €";

            // Feedback Copie
            navigator.clipboard.writeText(result);
            const oldBtnText = btn.innerText;
            btn.innerText = "COPIÉ !";
            btn.style.background = "#4ADE80";
            
            setTimeout(() => {
                btn.innerText = oldBtnText;
                btn.style.background = "#5D5FEF";
            }, 2000);
        }

        function runSnapshot() {
            const editor = document.getElementById('editor');
            const snap = "[ACTION: CONTEXT_DUMP]\n[MODE: MIGRATION]";
            editor.value = snap;
            navigator.clipboard.writeText(snap);
        }
    </script>
</body>
</html>
