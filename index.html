<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREENK | Distilled Context</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2225%22 fill=%22white%22/></svg>">
    <style>
        :root {
            --bg: #08080A;
            --card: #121217;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #5D5FEF; /* Le bleu-violet électrique de ton exemple */
            --text-main: #FFFFFF;
            --text-dim: #63636E;
            --green: #4ADE80;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            letter-spacing: -0.02em;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .brand h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .version-pill {
            background: rgba(93, 95, 239, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(93, 95, 239, 0.2);
        }

        /* L'EDITEUR STYLE GLASS */
        .glass-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 40px;
            font-size: 18px;
            resize: none;
            outline: none;
            line-height: 1.7;
            font-family: inherit;
        }

        /* DASHBOARD STATS */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            padding: 20px 40px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--border);
        }

        .stat-group { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-value.money { color: var(--green); }

        /* ACTIONS */
        .actions {
            padding: 30px 40px;
            display: flex;
            gap: 15px;
        }

        button {
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-prime {
            background: var(--accent);
            color: white;
            flex-grow: 2;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.05);
            color: white;
            flex-grow: 1;
            border: 1px solid var(--border);
        }

        button:hover { filter: brightness(1.2); transform: translateY(-1px); }

        footer {
            margin-top: auto;
            padding-top: 40px;
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 12px;
        }

        footer a { color: var(--text-dim); text-decoration: none; margin-right: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">
                <h1>SHREENK</h1>
            </div>
            <div class="version-pill">BETA 2.0 // PRIVATE ACCESS</div>
        </header>

        <div class="glass-panel">
            <textarea id="editor" placeholder="Insérez votre prompt ici. SHREENK s'occupe de la distillation..."></textarea>
            
            <div class="dashboard">
                <div class="stat-group">
                    <span class="stat-label">Économie estimée</span>
                    <span class="stat-value money" id="money">0.00 €</span>
                </div>
                <div class="stat-group" style="text-align: right;">
                    <span class="stat-label">Tokens supprimés</span>
                    <span class="stat-value" id="tokens">0</span>
                </div>
            </div>

            <div class="actions">
                <button class="btn-prime" onclick="shreenk()">Compresser & Copier</button>
                <button class="btn-ghost" onclick="snapshot()">Snapshot</button>
            </div>
        </div>

        <footer>
            <div>
                <a href="#">Security</a>
                <a href="#">Pricing</a>
                <a href="#">Terms</a>
            </div>
            <div>SHREENK.APP © 2026 — Built for efficiency</div>
        </footer>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const money = document.getElementById('money');
        const tokens = document.getElementById('tokens');

        function shreenk() {
            const raw = editor.value;
            if(!raw) return;
            const oldLen = raw.length;

            let clean = raw.replace(/(bonjour|salut|hello|merci|svp|s'il vous plaît|pourriez-vous|est-ce que|thanks|please)/gi, '');
            clean = clean.replace(/\n\s*\n/g, '\n').trim();
            const result = `[TASK]\n${clean}\n[MODE:DENSE]`;
            
            editor.value = result;
            navigator.clipboard.writeText(result);

            const tokenCount = Math.max(0, Math.ceil((oldLen - result.length) / 4));
            const savings = (tokenCount * 0.00003).toFixed(3);

            tokens.innerText = tokenCount;
            money.innerText = savings + " €";
            
            const btn = document.querySelector('.btn-prime');
            const originalText = btn.innerText;
            btn.innerText = "Copié dans le presse-papier";
            btn.style.background = "#4ADE80";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "var(--accent)";
            }, 2000);
        }

        function snapshot() {
            const snap = "[ACTION: CONTEXT_DUMP]\n[MODE: MIGRATION]";
            editor.value = snap;
            navigator.clipboard.writeText(snap);
        }
    </script>
</body>
</html>
